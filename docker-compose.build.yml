# Use this if you want to build locally instead of pulling from ghcr.io
services:
  meclaw:
    build: .
    container_name: meclaw
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
      - "8080:8080"
    volumes:
      - meclaw-data:/var/lib/postgresql/data
      - ${MECLAW_CONFIG:-./config.sql}:/config/config.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  meclaw-data:
